name: Deploy admin-panel to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'admin-panel/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin-panel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_ADMIN_UID: ${{ vars.VITE_ADMIN_UID || 'LUdX7IDd4fhAHK2JvhLeaLbgQFx1' }}
          VITE_BASE_PATH: /watchmoney-admin-panel/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: admin-panel/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
